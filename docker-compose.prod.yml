version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_TELEMETRY_DISABLED=1
      - ALLOW_SEED=false
      - E2E_BYPASS_RATE_LIMIT=0
      - E2E_ALLOW_AUTH_RESET=0
      - E2E_ALLOW_PRODUCTION_DB=0
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - erp-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-erp_system}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - erp-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.docker.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/letsencrypt/live:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - erp-network

volumes:
  postgres_data:

networks:
  erp-network:
    driver: bridge
